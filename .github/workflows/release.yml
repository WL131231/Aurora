name: Release

# tag push 시 Windows + macOS 동시 빌드 → GitHub Release 자동 첨부.
# 사용자 = releases/latest/download/<file> URL 로 즉시 다운로드.
#
# 사용법:
#   git tag v0.1.0 && git push origin v0.1.0
#   → ~10분 후 https://github.com/WL131231/Aurora/releases/latest 에 자동 첨부:
#     · Aurora-windows.exe  (Windows 단일 실행파일)
#     · Aurora-macOS.zip    (macOS .app 번들 zip)
#
# 직접 다운로드 URL (Landing 버튼이 가리킴):
#   https://github.com/WL131231/Aurora/releases/latest/download/Aurora-windows.exe
#   https://github.com/WL131231/Aurora/releases/latest/download/Aurora-macOS.zip
on:
  push:
    tags:
      - 'v*'         # v0.1.0, v1.2.3 등 SemVer
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (예: v0.1.0)'
        required: true
        type: string

# 같은 tag 새 push 시 이전 빌드 자동 취소
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false   # 한 OS 빌드 실패해도 다른 OS 는 계속
      matrix:
        include:
          - os: windows-latest
            asset_name: Aurora-windows.exe
            artifact_path: dist/Aurora.exe
            artifact_name: aurora-windows
          - os: macos-latest
            asset_name: Aurora-macOS.zip
            artifact_path: dist/Aurora-macOS.zip
            artifact_name: aurora-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -e .

      # aiodns 는 Windows aiohttp DNS 충돌 (memory project_user_onboarding.md).
      # macOS 는 영향 없으나 일관성 위해 양 OS 모두 제거.
      - name: Remove aiodns (DNS 호환)
        run: pip uninstall -y aiodns
        continue-on-error: true   # transitive dep, 없어도 OK

      - name: Generate app icon (옵션, 없으면 skip)
        run: python scripts/generate_icon.py
        continue-on-error: true   # 아이콘 없어도 빌드 자체는 가능

      - name: Build (PyInstaller --onefile)
        run: python scripts/build_exe.py --onefile

      # ===== Windows 검증 =====
      - name: Verify Windows artifact
        if: matrix.os == 'windows-latest'
        run: |
          if (-not (Test-Path "dist/Aurora.exe")) {
              Write-Error "dist/Aurora.exe 생성 실패"
              exit 1
          }
          $size = (Get-Item "dist/Aurora.exe").Length / 1MB
          Write-Host "Aurora.exe 크기: $([math]::Round($size, 1)) MB"
        shell: pwsh

      # ===== macOS 검증 + zip =====
      - name: Verify + zip macOS .app bundle
        if: matrix.os == 'macos-latest'
        run: |
          # PyInstaller --windowed on macOS 는 --onefile 무시하고 .app 생성
          if [ ! -d "dist/Aurora.app" ] && [ ! -f "dist/Aurora" ]; then
              echo "macOS artifact 미생성 (Aurora.app 없음)"
              ls -la dist/
              exit 1
          fi
          if [ -d "dist/Aurora.app" ]; then
              cd dist
              zip -r -y Aurora-macOS.zip Aurora.app
              echo "Aurora-macOS.zip 크기: $(du -h Aurora-macOS.zip | cut -f1)"
          else
              # --onefile 모드 단일 바이너리 → 그대로 zip
              cd dist
              zip -y Aurora-macOS.zip Aurora
              echo "Aurora-macOS.zip 크기 (단일 바이너리): $(du -h Aurora-macOS.zip | cut -f1)"
          fi

      - name: Upload artifact (workflow 결과)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          retention-days: 30

      - name: Rename for release asset
        # asset_name 은 다운로드 시 파일명 (Aurora-windows.exe / Aurora-macOS.zip)
        # 빌드 산출물 → asset_name 으로 복사 (직접 다운로드 URL 일관)
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
              cp "dist/Aurora.exe" "dist/Aurora-windows.exe"
          fi
          # macOS 는 위 zip 단계에서 이미 dist/Aurora-macOS.zip 으로 만들어짐
        shell: bash

      - name: Create GitHub Release + attach artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset_name }}
          generate_release_notes: true   # commit 기반 자동 changelog
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
