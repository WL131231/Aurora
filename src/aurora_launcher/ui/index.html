<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Aurora Launcher</title>
    <link rel="stylesheet" href="css/style.css" />
</head>
<body>
    <!-- 좌→우 그라디언트 배경 (#31323e → #60519b) + painterly 텍스처 -->
    <div class="bg-gradient"></div>
    <div class="bg-texture"></div>

    <main class="cinematic">
        <!-- 좌측 — 타이틀 / 부제 / Start / 버전 -->
        <section class="hero">
            <div class="hero-top">
                <div class="brand-row">
                    <div class="logo-mark">
                        <svg width="40" height="40" viewBox="0 0 28 28" fill="none">
                            <defs>
                                <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                                    <stop offset="0%" stop-color="#a855f7" />
                                    <stop offset="50%" stop-color="#6366f1" />
                                    <stop offset="100%" stop-color="#22d3ee" />
                                </linearGradient>
                            </defs>
                            <path d="M14 2 L26 14 L14 26 L2 14 Z" stroke="url(#logoGrad)" stroke-width="1.5" fill="none" />
                            <path d="M14 8 L20 14 L14 20 L8 14 Z" fill="url(#logoGrad)" opacity="0.6" />
                        </svg>
                    </div>
                    <span class="brand-text">AURORA</span>
                </div>
                <div class="meta-info">
                    <span id="version-info">v—</span>
                </div>
            </div>

            <div class="hero-content">
                <div class="episode-num">01</div>
                <h1 class="hero-title">AURORA</h1>
                <p class="hero-sub">
                    고빈도 룰 기반 자동매매 봇 — 멀티 거래소 / 멀티 페어 / 고배율.
                    Trading Start 클릭 시 자동 업데이트 확인 + 본체 실행.
                </p>

                <div id="status-line">준비됨 — Trading Start 클릭</div>
            </div>

            <div class="hero-bottom">
                <div class="log-area">
                    <ul id="log-list"></ul>
                </div>
            </div>
        </section>

        <!-- 우측 — 거대 다이아몬드 비주얼 + Trading Start 버튼 -->
        <aside class="visual">
            <div class="diamond-stage">
                <svg viewBox="0 0 400 400" class="diamond-hero">
                    <defs>
                        <linearGradient id="heroGrad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#a855f7" />
                            <stop offset="50%" stop-color="#6366f1" />
                            <stop offset="100%" stop-color="#22d3ee" />
                        </linearGradient>
                        <radialGradient id="heroGlow" cx="50%" cy="50%" r="50%">
                            <stop offset="0%" stop-color="rgba(168, 85, 247, 0.4)" />
                            <stop offset="100%" stop-color="rgba(168, 85, 247, 0)" />
                        </radialGradient>
                    </defs>
                    <!-- glow 배경 -->
                    <circle cx="200" cy="200" r="180" fill="url(#heroGlow)" />
                    <!-- 외곽 다이아몬드 -->
                    <path d="M200 40 L360 200 L200 360 L40 200 Z"
                          stroke="url(#heroGrad)" stroke-width="3" fill="none"
                          opacity="0.95" />
                    <!-- 중간 다이아몬드 -->
                    <path d="M200 90 L310 200 L200 310 L90 200 Z"
                          stroke="url(#heroGrad)" stroke-width="2" fill="none"
                          opacity="0.5" />
                    <!-- 내부 다이아몬드 (fill) -->
                    <path d="M200 130 L270 200 L200 270 L130 200 Z"
                          fill="url(#heroGrad)" opacity="0.7" />
                </svg>
            </div>

            <button id="btn-start" class="btn-start">
                <span class="btn-arrow">▶</span>
                <span class="btn-label">Trading Start</span>
            </button>
        </aside>
    </main>

    <script src="js/app.js"></script>
</body>
</html>
