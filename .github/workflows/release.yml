name: Release

# tag push 시 Windows + macOS 동시 빌드 → GitHub Release 자동 첨부.
# 사용자 = releases/latest/download/<file> URL 로 즉시 다운로드.
#
# 사용법:
#   git tag v0.1.0 && git push origin v0.1.0
#   → ~10분 후 https://github.com/WL131231/Aurora/releases/latest 에 자동 첨부:
#     · Aurora-windows.exe  (Windows 단일 실행파일)
#     · Aurora-macOS.zip    (macOS .app 번들 zip)
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag (예: v0.1.0)'
        required: true
        type: string

# 같은 tag 새 push 시 이전 빌드 자동 취소
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

# Windows runner 의 cp1252 stdout 가 한글 인코딩 X → 전역 PYTHONIOENCODING=utf-8
# (build_exe.py 의 한글 print 회피, 봇 런타임 한글 로그도 안전)
env:
  PYTHONIOENCODING: utf-8

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            asset_name: Aurora-windows.exe
            artifact_path: dist/Aurora.exe
            artifact_name: aurora-windows
          - os: macos-latest
            asset_name: Aurora-macOS.zip
            artifact_path: dist/Aurora-macOS.zip
            artifact_name: aurora-macos

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # setup-python 의 출력 path 를 명시 사용 — macOS PATH 우선순위 이슈 회피
      # (system Python 이 PATH 우선 잡혀 hostedtoolcache 의 PyInstaller 못 찾던 문제)
      - name: Setup Python 3.11
        id: setup
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        shell: bash
        run: |
          PY="${{ steps.setup.outputs.python-path }}"
          "$PY" -m pip install --upgrade pip
          "$PY" -m pip install -r requirements.txt
          "$PY" -m pip install -e .

      # aiodns 는 Windows aiohttp DNS 충돌 (memory project_user_onboarding.md).
      # macOS 도 일관성 위해 양 OS 모두 제거.
      - name: Remove aiodns (DNS 호환)
        shell: bash
        run: |
          "${{ steps.setup.outputs.python-path }}" -m pip uninstall -y aiodns
        continue-on-error: true

      - name: Generate app icon (옵션, 없으면 skip)
        shell: bash
        run: |
          "${{ steps.setup.outputs.python-path }}" scripts/generate_icon.py
        continue-on-error: true

      - name: Build (PyInstaller --onefile)
        shell: bash
        run: |
          "${{ steps.setup.outputs.python-path }}" scripts/build_exe.py --onefile

      # ===== Windows 검증 =====
      - name: Verify Windows artifact
        if: matrix.os == 'windows-latest'
        run: |
          if (-not (Test-Path "dist/Aurora.exe")) {
              Write-Error "dist/Aurora.exe 생성 실패"
              exit 1
          }
          $size = (Get-Item "dist/Aurora.exe").Length / 1MB
          Write-Host "Aurora.exe size: $([math]::Round($size, 1)) MB"
        shell: pwsh

      # ===== macOS 검증 + zip =====
      - name: Verify + zip macOS .app bundle
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          if [ ! -d "dist/Aurora.app" ] && [ ! -f "dist/Aurora" ]; then
              echo "macOS artifact missing (Aurora.app not found)"
              ls -la dist/
              exit 1
          fi
          if [ -d "dist/Aurora.app" ]; then
              cd dist
              zip -r -y Aurora-macOS.zip Aurora.app
              echo "Aurora-macOS.zip size: $(du -h Aurora-macOS.zip | cut -f1)"
          else
              cd dist
              zip -y Aurora-macOS.zip Aurora
              echo "Aurora-macOS.zip size (single binary): $(du -h Aurora-macOS.zip | cut -f1)"
          fi

      - name: Upload artifact (workflow 결과)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.artifact_path }}
          retention-days: 30

      - name: Rename for release asset
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        run: |
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
              cp "dist/Aurora.exe" "dist/Aurora-windows.exe"
          fi

      - name: Create GitHub Release + attach artifact
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/${{ matrix.asset_name }}
          generate_release_notes: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
